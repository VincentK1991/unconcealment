server.port=8080

# Path to ontology/manifest.yaml (relative to working directory or absolute)
app.manifest-path=ontology/manifest.yaml

# Fuseki URL — override with FUSEKI_URL env var in Docker
app.fuseki-url=${FUSEKI_URL:http://localhost:3030}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Disable Spring Security auto-config (no auth in Phase 1)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
