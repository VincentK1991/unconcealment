server.port=8080

# Path to ontology/manifest.yaml (relative to working directory or absolute)
app.manifest-path=ontology/manifest.yaml

# Fuseki URL — override with FUSEKI_URL env var in Docker
app.fuseki-url=${FUSEKI_URL:http://localhost:3030}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Disable Spring Security auto-config (no auth in Phase 1)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# PostgreSQL KG connection — used by Ontop VKG for SPARQL-to-SQL translation
# Matches the postgres-kg service in docker-compose.yml (port 5433, db=kg)
app.postgres.url=${POSTGRES_KG_URL:jdbc:postgresql://localhost:5433/kg}
app.postgres.username=${POSTGRES_KG_USER:admin}
app.postgres.password=${POSTGRES_KG_PASSWORD:test1234}
