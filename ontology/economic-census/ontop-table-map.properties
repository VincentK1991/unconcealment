# Ontop SQL post-processing rules for the economic-census domain
#
# OntopVkgService applies these rules AFTER SPARQL-to-SQL translation:
#   1. All key=value pairs whose keys start with a double-quote are treated
#      as exact string replacements: replace key with value in the generated SQL.
#   2. ontop.sql.rewrite.identifier.quote controls residual identifier requoting.
#      backtick: converts any remaining "identifier" tokens to `identifier`
#      (used here because BigQuery uses backtick-quoted identifiers)
#
# This file is domain-specific; OntopVkgService is domain-agnostic and
# reads it generically. Insurance does not have this file, so no
# post-processing applies there.

ontop.sql.rewrite.identifier.quote=backtick

# Table name rewrites: PostgreSQL schema.table → BigQuery project.dataset.table
# Keys are the double-quoted forms that Ontop generates for PostgreSQL.
"census_bq"."acs_county_1yr"=`bigquery-public-data.census_bureau_acs.county_2021_1yr`
"census_bq"."acs_county_5yr"=`bigquery-public-data.census_bureau_acs.county_2020_5yr`
"census_bq"."acs_state_1yr"=`bigquery-public-data.census_bureau_acs.state_2021_1yr`
"census_bq"."atlas_tract_outcomes"=`bigquery-public-data.census_opportunity_atlas.tract_outcomes`
"census_bq"."atlas_tract_covariates"=`bigquery-public-data.census_opportunity_atlas.tract_covariates`
"census_bq"."bls_qcew_2019"=`bigquery-public-data.bls_qcew.2019_q2`
