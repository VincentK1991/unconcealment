# Ontop JDBC configuration for the economic-census domain
# Credentials are resolved from environment variables with fallbacks.
# Format: ${ENV_VAR:default_value}
#
# The economic-census domain uses a DDL-only PostgreSQL schema (census_bq)
# in the same postgres-kg database. Ontop uses this schema for SPARQL-to-SQL
# translation. The generated SQL is then rewritten to BigQuery table names
# by the post-processing rules in ontop-table-map.properties.

ontop.jdbc.url=${POSTGRES_KG_URL:jdbc:postgresql://localhost:5433/kg}
ontop.jdbc.user=${POSTGRES_KG_USER:admin}
ontop.jdbc.password=${POSTGRES_KG_PASSWORD:test1234}
ontop.jdbc.driver=org.postgresql.Driver
